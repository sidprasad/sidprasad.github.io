summary: >-
  I am a programming languages researcher interested in the human aspects of
  programming and formal reasoning. I study not only how PL and FM techniques
  can solve problems programmers face, but also how programmers' experiences
  can inform the design of our languages, logics, and software tools. My
  research is informed by my time as an engineer: I have written code that
  doesn't do what I want it to, and I want to spare everyone else the indignity.

