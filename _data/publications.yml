- title: "Lightweight Diagramming for Lightweight Formal Methods: A Grounded Language Design"
  authors: "Siddhartha Prasad, Ben Greenman, Tim Nelson, Shriram Krishnamurthi"
  venue: "European Conference on Object-Oriented Programming"
  venue_short: "ECOOP"
  year: 2025
  code_url: https://github.com/sidprasad/copeanddrag
  project: 'diagramming'
  paper_url: https://cs.brown.edu/people/tbn/publications/cnd-ecoop25.pdf
  descr: "Model finders (e.g., Alloy and Forge) discover instances of a datatype specification and counterexamples to conjectures. Instances can help users debug their designs, but only if they are properly understood. This paper introduces a visualizer called CnD that avoids misleading diagrams by default and offers a low-code way to communicate domain-specific constraints. CnD helps shed light on ``unknown unknowns'' in the early stages of a specification design."
  blog_url: https://blog.brownplt.org/2025/06/09/copeanddrag.html
  awards:
    - "Distinguished Paper Award"
    - "Distinguished Artifact Award"

